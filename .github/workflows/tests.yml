name: Tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies and run pytest
        run: uv sync --extra dev && uv run pytest -v
